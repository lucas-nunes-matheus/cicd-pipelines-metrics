name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          # PONTO DE VARIAÇÃO 1 (cache): adicionar/remover a linha abaixo
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run lint
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    # PONTO DE VARIAÇÃO 2 (paralelismo): descomentar p/ sequencial
    # needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip # acompanha o PONTO DE VARIAÇÃO 1
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest --json-report --json-report-file=report.json -v
      - name: Upload test report
        if: always() # artefato sobe mesmo com teste falhando
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: report.json
